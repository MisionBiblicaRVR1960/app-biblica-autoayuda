<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema Bíblico RVR1960 - Autoayuda Familiar</title>
    <!-- Framework de diseño y animaciones de alta gama -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com"/>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .premium-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 25px -5px rgba(30, 41, 59, 0.05), 0 8px 16px -6px rgba(30, 41, 59, 0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .premium-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 35px -5px rgba(79, 70, 229, 0.1), 0 12px 20px -6px rgba(79, 70, 229, 0.05);
        }
        .btn-3d {
            transition: all 0.2s ease;
            box-shadow: 0 4px 0px #312e81;
        }
        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #312e81;
        }
        .pulse-soft {
            animation: softPulse 3s infinite;
        }
        @keyframes softPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-50 via-indigo-50 to-blue-50 min-h-screen text-slate-800 font-sans antialiased selection:bg-indigo-200">

    <!-- Contenedor Responsivo Móvil de Alta Fidelidad -->
    <main class="max-w-md mx-auto px-5 py-8 sm:px-6 min-h-screen flex flex-col justify-between">
        
        <div>
            <!-- Encabezado de la App con Animación -->
            <header class="text-center mb-8 animate__animated animate__fadeInDown">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-lg shadow-indigo-200 mb-3 pulse-soft">
                    <i class="fa-solid fa-cross text-2xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-900 to-blue-800">Pan de Vida</h1>
                <p class="text-[11px] text-indigo-600 mt-1.5 uppercase tracking-widest font-black bg-indigo-50 inline-block px-3 py-1 rounded-full border border-indigo-100">Reina-Valera 1960</p>
            </header>

            <!-- Sección Activa del Día -->
            <div class="space-y-5">
                
                <!-- Tarjeta 1: Versículo -->
                <section class="premium-card rounded-3xl p-6 animate__animated animate__fadeInUp" style="animation-delay: 0.1s;">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600">
                                <i class="fa-solid fa-book-open text-sm"></i>
                            </div>
                            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Versículo del Día</h2>
                        </div>
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                    </div>
                    <p id="txt-versiculo" class="text-lg italic text-slate-700 leading-relaxed font-serif pl-2 border-l-4 border-indigo-500">"Cargando la palabra de Dios..."</p>
                </section>

                <!-- Tarjeta 2: Oración -->
                <section class="premium-card rounded-3xl p-6 animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-8 h-8 rounded-xl bg-purple-50 flex items-center justify-center text-purple-600">
                            <i class="fa-solid fa-hands-praying text-sm"></i>
                        </div>
                        <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Oración por tus Hijos</h2>
                    </div>
                    <p id="txt-oracion" class="text-slate-600 text-sm leading-relaxed">Generando oración basada en la promesa de hoy...</p>
                </section>

                <!-- Tarjeta 3: Devocional -->
                <section class="premium-card rounded-3xl p-6 animate__animated animate__fadeInUp" style="animation-delay: 0.3s;">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-8 h-8 rounded-xl bg-amber-50 flex items-center justify-center text-amber-500">
                            <i class="fa-solid fa-lightbulb text-sm"></i>
                        </div>
                        <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Sabiduría Diaria</h2>
                    </div>
                    <p id="txt-devocional" class="text-slate-600 text-sm leading-relaxed">Preparando el mensaje diario...</p>
                </section>

            </div>

            <!-- Botón de Acción Interactivo 3D -->
            <div class="mt-8 px-2 animate__animated animate__fadeInUp" style="animation-delay: 0.4s;">
                <button onclick="compartirContenido()" class="btn-3d w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-6 rounded-2xl flex items-center justify-center gap-2 text-sm uppercase tracking-wider">
                    <i class="fa-solid fa-share-nodes"></i> Compartir con la Familia
                </button>
            </div>
        </div>

        <!-- Navegación Inferior Estilo App Premium -->
        <footer class="mt-12 text-center space-y-4">
            <div class="bg-white/80 backdrop-blur-md rounded-2xl p-2 flex justify-around shadow-sm border border-slate-100 max-w-xs mx-auto">
                <button class="flex flex-col items-center gap-1 text-indigo-600 px-3 py-1 rounded-xl bg-indigo-50/50"><i class="fa-solid fa-house text-sm"></i><span class="text-[9px] font-bold">Inicio</span></button>
                <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 px-3 py-1 transition-colors"><i class="fa-solid fa-gamepad text-sm"></i><span class="text-[9px] font-bold">Trivia</span></button>
                <button class="flex flex-col items-center gap-1 text-slate-400 hover:text-indigo-600 px-3 py-1 transition-colors"><i class="fa-solid fa-book-bookmark text-sm"></i><span class="text-[9px] font-bold">Diario</span></button>
            </div>
            <p class="text-[10px] text-slate-400 font-medium tracking-wide">© 2026 Ecosistema Bíblico Familiar • Llevando verdad y esperanza</p>
        </footer>

    </main>

    <script>
        function compartirContenido() {
            if (navigator.share) {
                navigator.share({
                    title: 'Pan de Vida Diario',
                    text: 'Te comparto la palabra de Dios para el día de hoy basada en la RVR1960.',
                    url: window.location.href
                }).catch(console.error);
            } else {
                alert("Link copiado para compartir con tu familia.");
            }
        }
    </script>
</body>
</html>
